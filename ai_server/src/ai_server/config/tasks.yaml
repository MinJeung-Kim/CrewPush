research_task:
  description: >
    {topic}에 대해 조사하고 핵심 내용을 정리하세요.
    현재 연도는 {current_year}입니다.
  expected_output: >
    {topic}에 대한 핵심 정보 5가지를 bullet point로 정리한 목록
  agent: researcher
  human_input: true   # ← Training 피드백을 받으려면 반드시 true

reporting_task:
  description: >
    research_task의 결과를 바탕으로 상세 보고서를 작성하세요.
  expected_output: >
    마크다운 형식의 상세 보고서 (각 항목별 설명 포함)
  agent: reporting_analyst
  human_input: true   # ← Training 피드백을 받으려면 반드시 true